<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#06090E"/>
  <text x="600" y="44" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#E4E8ED" text-anchor="middle">Event Registration Flow: Landing to Follow-up</text>
  <text x="600" y="66" font-family="system-ui,sans-serif" font-size="13" fill="#7A8899" text-anchor="middle">Full attribution with GA4 + Meta Pixel at every step</text>

  <!-- Arrows between steps -->
  <g stroke="#00C2E0" stroke-width="2" fill="#00C2E0">
    <line x1="285" y1="210" x2="315" y2="210"/>
    <polygon points="315,210 308,205 308,215"/>
    <line x1="575" y1="210" x2="605" y2="210"/>
    <polygon points="605,210 598,205 598,215"/>
    <line x1="865" y1="210" x2="895" y2="210"/>
    <polygon points="895,210 888,205 888,215"/>
  </g>

  <!-- Step 1: Landing -->
  <g transform="translate(40,100)">
    <rect width="250" height="220" rx="12" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
    <rect x="0" y="0" width="250" height="4" rx="2" fill="#00C2E0"/>
    <circle cx="125" cy="46" r="22" fill="#00C2E0" opacity="0.12"/>
    <text x="125" y="52" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#00C2E0" text-anchor="middle">1</text>
    <text x="125" y="88" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#E4E8ED" text-anchor="middle">Landing Page</text>
    <text x="125" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899" text-anchor="middle">Fast, mobile-first</text>
    <rect x="20" y="128" width="210" height="24" rx="4" fill="rgba(0,194,224,0.06)"/>
    <text x="125" y="144" font-family="system-ui,sans-serif" font-size="10" fill="#00C2E0" text-anchor="middle">Event details + venue map</text>
    <rect x="20" y="158" width="210" height="24" rx="4" fill="rgba(0,194,224,0.06)"/>
    <text x="125" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#00C2E0" text-anchor="middle">Speakers + agenda</text>
    <rect x="20" y="188" width="210" height="24" rx="4" fill="rgba(0,194,224,0.06)"/>
    <text x="125" y="204" font-family="system-ui,sans-serif" font-size="10" fill="#00C2E0" text-anchor="middle">Pixel fires: PageView</text>
  </g>

  <!-- Step 2: Registration -->
  <g transform="translate(325,100)">
    <rect width="250" height="220" rx="12" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
    <rect x="0" y="0" width="250" height="4" rx="2" fill="#E8B931"/>
    <circle cx="125" cy="46" r="22" fill="#E8B931" opacity="0.12"/>
    <text x="125" y="52" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#E8B931" text-anchor="middle">2</text>
    <text x="125" y="88" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#E4E8ED" text-anchor="middle">Registration</text>
    <text x="125" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899" text-anchor="middle">Custom form, no Eventbrite</text>
    <rect x="20" y="128" width="210" height="24" rx="4" fill="rgba(232,185,49,0.06)"/>
    <text x="125" y="144" font-family="system-ui,sans-serif" font-size="10" fill="#E8B931" text-anchor="middle">Name, email, title</text>
    <rect x="20" y="158" width="210" height="24" rx="4" fill="rgba(232,185,49,0.06)"/>
    <text x="125" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#E8B931" text-anchor="middle">Dietary + accommodations</text>
    <rect x="20" y="188" width="210" height="24" rx="4" fill="rgba(232,185,49,0.06)"/>
    <text x="125" y="204" font-family="system-ui,sans-serif" font-size="10" fill="#E8B931" text-anchor="middle">Pixel fires: Lead</text>
  </g>

  <!-- Step 3: Confirmation -->
  <g transform="translate(615,100)">
    <rect width="250" height="220" rx="12" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
    <rect x="0" y="0" width="250" height="4" rx="2" fill="#00C2E0"/>
    <circle cx="125" cy="46" r="22" fill="#00C2E0" opacity="0.12"/>
    <text x="125" y="52" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#00C2E0" text-anchor="middle">3</text>
    <text x="125" y="88" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#E4E8ED" text-anchor="middle">Confirmation</text>
    <text x="125" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899" text-anchor="middle">Thank-you + calendar add</text>
    <rect x="20" y="128" width="210" height="24" rx="4" fill="rgba(0,194,224,0.06)"/>
    <text x="125" y="144" font-family="system-ui,sans-serif" font-size="10" fill="#00C2E0" text-anchor="middle">Email receipt auto-sent</text>
    <rect x="20" y="158" width="210" height="24" rx="4" fill="rgba(0,194,224,0.06)"/>
    <text x="125" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#00C2E0" text-anchor="middle">.ics calendar file</text>
    <rect x="20" y="188" width="210" height="24" rx="4" fill="rgba(0,194,224,0.06)"/>
    <text x="125" y="204" font-family="system-ui,sans-serif" font-size="10" fill="#00C2E0" text-anchor="middle">Pixel fires: CompleteReg</text>
  </g>

  <!-- Step 4: Follow-up -->
  <g transform="translate(905,100)">
    <rect width="255" height="220" rx="12" fill="#0C1118" stroke="#00C2E0" stroke-width="2"/>
    <rect x="0" y="0" width="255" height="4" rx="2" fill="#34D399"/>
    <circle cx="127" cy="46" r="22" fill="#34D399" opacity="0.12"/>
    <text x="127" y="52" font-family="system-ui,sans-serif" font-size="16" font-weight="800" fill="#34D399" text-anchor="middle">4</text>
    <text x="127" y="88" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#E4E8ED" text-anchor="middle">Follow-up</text>
    <text x="127" y="110" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899" text-anchor="middle">Reminders + retargeting</text>
    <rect x="22" y="128" width="211" height="24" rx="4" fill="rgba(52,211,153,0.08)"/>
    <text x="127" y="144" font-family="system-ui,sans-serif" font-size="10" fill="#34D399" text-anchor="middle">T-7 day reminder email</text>
    <rect x="22" y="158" width="211" height="24" rx="4" fill="rgba(52,211,153,0.08)"/>
    <text x="127" y="174" font-family="system-ui,sans-serif" font-size="10" fill="#34D399" text-anchor="middle">Meta retargeting audience</text>
    <rect x="22" y="188" width="211" height="24" rx="4" fill="rgba(52,211,153,0.08)"/>
    <text x="127" y="204" font-family="system-ui,sans-serif" font-size="10" fill="#34D399" text-anchor="middle">Post-event survey</text>
  </g>

  <!-- Stats bar -->
  <g transform="translate(40,360)">
    <rect width="1120" height="100" rx="10" fill="#0C1118" stroke="#1E2A38" stroke-width="1"/>
    <g transform="translate(80,16)">
      <text x="0" y="28" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#00C2E0">$0</text>
      <text x="0" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#7A8899">Per-registrant fee</text>
    </g>
    <g transform="translate(320,16)">
      <text x="0" y="28" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#E4E8ED">48hrs</text>
      <text x="0" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#7A8899">Clone to new city</text>
    </g>
    <g transform="translate(560,16)">
      <text x="0" y="28" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#E8B931">100%</text>
      <text x="0" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#7A8899">Attribution</text>
    </g>
    <g transform="translate(800,16)">
      <text x="0" y="28" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#34D399">Pixel</text>
      <text x="0" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#7A8899">GA4 + Meta at every step</text>
    </g>
  </g>

  <!-- Bottom copy strip -->
  <g transform="translate(40,490)">
    <rect width="1120" height="110" rx="10" fill="#111820"/>
    <text x="560" y="36" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#E4E8ED" text-anchor="middle">Built for Multi-City Campaigns</text>
    <g transform="translate(80,56)">
      <text x="0" y="16" font-family="system-ui,sans-serif" font-size="13" fill="#00C2E0">One template</text>
      <text x="0" y="36" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899">Clone per city in 48 hours</text>
    </g>
    <g transform="translate(320,56)">
      <text x="0" y="16" font-family="system-ui,sans-serif" font-size="13" fill="#E8B931">Separate tracking</text>
      <text x="0" y="36" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899">Per-event pixels, no cross-contamination</text>
    </g>
    <g transform="translate(640,56)">
      <text x="0" y="16" font-family="system-ui,sans-serif" font-size="13" fill="#34D399">Full ownership</text>
      <text x="0" y="36" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899">Registrant data stays with you</text>
    </g>
    <g transform="translate(900,56)">
      <text x="0" y="16" font-family="system-ui,sans-serif" font-size="13" fill="#E4E8ED">No branding</text>
      <text x="0" y="36" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899">Your domain, your design</text>
    </g>
  </g>
</svg>
