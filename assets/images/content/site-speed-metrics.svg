<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#06090E"/>
  <text x="600" y="44" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#E4E8ED" text-anchor="middle">PageSpeed Metrics: What Google Actually Measures</text>
  <text x="600" y="66" font-family="system-ui,sans-serif" font-size="13" fill="#7A8899" text-anchor="middle">Core Web Vitals and the thresholds that decide rankings</text>

  <!-- Main score panel -->
  <g transform="translate(40,90)">
    <rect width="340" height="280" rx="12" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
    <text x="170" y="38" font-family="system-ui,sans-serif" font-size="13" fill="#7A8899" text-anchor="middle">Performance Score</text>

    <!-- Gauge circle -->
    <circle cx="170" cy="140" r="68" fill="none" stroke="#1E2A38" stroke-width="10"/>
    <circle cx="170" cy="140" r="68" fill="none" stroke="#34D399" stroke-width="10"
            stroke-dasharray="419 427" stroke-dashoffset="0" transform="rotate(-90 170 140)" stroke-linecap="round"/>
    <text x="170" y="148" font-family="system-ui,sans-serif" font-size="52" font-weight="800" fill="#34D399" text-anchor="middle">98</text>

    <text x="170" y="230" font-family="system-ui,sans-serif" font-size="12" fill="#7A8899" text-anchor="middle">Mobile &middot; Real device data</text>
    <rect x="48" y="248" width="244" height="20" rx="4" fill="rgba(52,211,153,0.08)"/>
    <text x="170" y="262" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#34D399" text-anchor="middle">PASSES CORE WEB VITALS</text>
  </g>

  <!-- Metric cards -->
  <g transform="translate(400,90)" font-family="system-ui,sans-serif">
    <!-- LCP -->
    <g>
      <rect width="370" height="130" rx="10" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="130" rx="3" fill="#00C2E0"/>
      <text x="24" y="30" font-size="12" fill="#7A8899">LCP &middot; Largest Contentful Paint</text>
      <text x="24" y="72" font-size="36" font-weight="800" fill="#00C2E0">1.2s</text>
      <text x="24" y="96" font-size="11" fill="#34D399">Good &lt; 2.5s</text>
      <rect x="24" y="104" width="322" height="6" rx="3" fill="#1E2A38"/>
      <rect x="24" y="104" width="110" height="6" rx="3" fill="#34D399"/>
    </g>
    <!-- CLS -->
    <g transform="translate(390,0)">
      <rect width="370" height="130" rx="10" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="130" rx="3" fill="#E8B931"/>
      <text x="24" y="30" font-size="12" fill="#7A8899">CLS &middot; Cumulative Layout Shift</text>
      <text x="24" y="72" font-size="36" font-weight="800" fill="#E8B931">0.02</text>
      <text x="24" y="96" font-size="11" fill="#34D399">Good &lt; 0.1</text>
      <rect x="24" y="104" width="322" height="6" rx="3" fill="#1E2A38"/>
      <rect x="24" y="104" width="40" height="6" rx="3" fill="#34D399"/>
    </g>
  </g>

  <g transform="translate(400,230)" font-family="system-ui,sans-serif">
    <!-- TBT -->
    <g>
      <rect width="370" height="130" rx="10" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="130" rx="3" fill="#00C2E0"/>
      <text x="24" y="30" font-size="12" fill="#7A8899">TBT &middot; Total Blocking Time</text>
      <text x="24" y="72" font-size="36" font-weight="800" fill="#00C2E0">30ms</text>
      <text x="24" y="96" font-size="11" fill="#34D399">Good &lt; 200ms</text>
      <rect x="24" y="104" width="322" height="6" rx="3" fill="#1E2A38"/>
      <rect x="24" y="104" width="60" height="6" rx="3" fill="#34D399"/>
    </g>
    <!-- FCP -->
    <g transform="translate(390,0)">
      <rect width="370" height="130" rx="10" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="130" rx="3" fill="#E8B931"/>
      <text x="24" y="30" font-size="12" fill="#7A8899">FCP &middot; First Contentful Paint</text>
      <text x="24" y="72" font-size="36" font-weight="800" fill="#E8B931">0.8s</text>
      <text x="24" y="96" font-size="11" fill="#34D399">Good &lt; 1.8s</text>
      <rect x="24" y="104" width="322" height="6" rx="3" fill="#1E2A38"/>
      <rect x="24" y="104" width="140" height="6" rx="3" fill="#34D399"/>
    </g>
  </g>

  <!-- Comparison bar -->
  <g transform="translate(40,400)">
    <rect width="1120" height="190" rx="10" fill="#0C1118" stroke="#1E2A38" stroke-width="1"/>
    <text x="30" y="34" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#E4E8ED">SharpPages vs Average Agency Site</text>
    <text x="30" y="54" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899">Mobile PageSpeed, same design complexity</text>

    <!-- Bar 1 -->
    <g transform="translate(30,76)">
      <text x="0" y="14" font-family="system-ui,sans-serif" font-size="11" fill="#E4E8ED">SharpPages</text>
      <rect x="120" y="0" width="900" height="20" rx="4" fill="#1E2A38"/>
      <rect x="120" y="0" width="882" height="20" rx="4" fill="#34D399"/>
      <text x="1030" y="15" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#34D399">98</text>
    </g>
    <!-- Bar 2 -->
    <g transform="translate(30,108)">
      <text x="0" y="14" font-family="system-ui,sans-serif" font-size="11" fill="#E4E8ED">Webflow</text>
      <rect x="120" y="0" width="900" height="20" rx="4" fill="#1E2A38"/>
      <rect x="120" y="0" width="657" height="20" rx="4" fill="#E8B931"/>
      <text x="1030" y="15" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#E8B931">73</text>
    </g>
    <!-- Bar 3 -->
    <g transform="translate(30,140)">
      <text x="0" y="14" font-family="system-ui,sans-serif" font-size="11" fill="#E4E8ED">WordPress</text>
      <rect x="120" y="0" width="900" height="20" rx="4" fill="#1E2A38"/>
      <rect x="120" y="0" width="405" height="20" rx="4" fill="#E85A50"/>
      <text x="1030" y="15" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#E85A50">45</text>
    </g>
  </g>
</svg>
