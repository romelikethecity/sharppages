<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#06090E"/>
  <text x="600" y="44" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#E4E8ED" text-anchor="middle">Website Audit: What We Measure</text>
  <text x="600" y="66" font-family="system-ui,sans-serif" font-size="13" fill="#7A8899" text-anchor="middle">Performance, SEO, Accessibility, Best Practices</text>

  <!-- Four gauges row -->
  <g font-family="system-ui,sans-serif">
    <!-- Performance -->
    <g transform="translate(70,110)">
      <rect width="250" height="240" rx="12" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
      <text x="125" y="32" font-size="12" fill="#7A8899" text-anchor="middle">Performance</text>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#1E2A38" stroke-width="10"/>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#34D399" stroke-width="10"
              stroke-dasharray="357 365" transform="rotate(-90 125 120)" stroke-linecap="round"/>
      <text x="125" y="132" font-size="44" font-weight="800" fill="#34D399" text-anchor="middle">98</text>
      <text x="125" y="200" font-size="11" fill="#34D399" text-anchor="middle">PASS · 0.9s LCP</text>
      <rect x="20" y="210" width="210" height="16" rx="3" fill="rgba(52,211,153,0.06)"/>
      <text x="125" y="222" font-size="10" fill="#34D399" text-anchor="middle">Core Web Vitals good</text>
    </g>

    <!-- SEO -->
    <g transform="translate(335,110)">
      <rect width="250" height="240" rx="12" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
      <text x="125" y="32" font-size="12" fill="#7A8899" text-anchor="middle">SEO</text>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#1E2A38" stroke-width="10"/>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#00C2E0" stroke-width="10"
              stroke-dasharray="346 365" transform="rotate(-90 125 120)" stroke-linecap="round"/>
      <text x="125" y="132" font-size="44" font-weight="800" fill="#00C2E0" text-anchor="middle">95</text>
      <text x="125" y="200" font-size="11" fill="#00C2E0" text-anchor="middle">Schema + meta OK</text>
      <rect x="20" y="210" width="210" height="16" rx="3" fill="rgba(0,194,224,0.06)"/>
      <text x="125" y="222" font-size="10" fill="#00C2E0" text-anchor="middle">Title, description, canonical</text>
    </g>

    <!-- Accessibility -->
    <g transform="translate(600,110)">
      <rect width="250" height="240" rx="12" fill="#0C1118" stroke="#1E2A38" stroke-width="1.5"/>
      <text x="125" y="32" font-size="12" fill="#7A8899" text-anchor="middle">Accessibility</text>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#1E2A38" stroke-width="10"/>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#E8B931" stroke-width="10"
              stroke-dasharray="335 365" transform="rotate(-90 125 120)" stroke-linecap="round"/>
      <text x="125" y="132" font-size="44" font-weight="800" fill="#E8B931" text-anchor="middle">92</text>
      <text x="125" y="200" font-size="11" fill="#E8B931" text-anchor="middle">WCAG AA</text>
      <rect x="20" y="210" width="210" height="16" rx="3" fill="rgba(232,185,49,0.06)"/>
      <text x="125" y="222" font-size="10" fill="#E8B931" text-anchor="middle">Alt text + color contrast</text>
    </g>

    <!-- Best Practices -->
    <g transform="translate(865,110)">
      <rect width="250" height="240" rx="12" fill="#0C1118" stroke="#00C2E0" stroke-width="2"/>
      <text x="125" y="32" font-size="12" fill="#7A8899" text-anchor="middle">Best Practices</text>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#1E2A38" stroke-width="10"/>
      <circle cx="125" cy="120" r="58" fill="none" stroke="#34D399" stroke-width="10"
              stroke-dasharray="365 365" transform="rotate(-90 125 120)" stroke-linecap="round"/>
      <text x="125" y="132" font-size="44" font-weight="800" fill="#34D399" text-anchor="middle">100</text>
      <text x="125" y="200" font-size="11" fill="#34D399" text-anchor="middle">HTTPS + no vulns</text>
      <rect x="20" y="210" width="210" height="16" rx="3" fill="rgba(52,211,153,0.06)"/>
      <text x="125" y="222" font-size="10" fill="#34D399" text-anchor="middle">Secure + modern</text>
    </g>
  </g>

  <!-- Issue findings grid -->
  <g transform="translate(40,380)">
    <rect width="1120" height="210" rx="10" fill="#0C1118" stroke="#1E2A38" stroke-width="1"/>
    <text x="30" y="34" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#E4E8ED">Audit Findings</text>
    <text x="30" y="52" font-family="system-ui,sans-serif" font-size="11" fill="#7A8899">What a typical audit surfaces on an agency-built site</text>

    <g font-family="system-ui,sans-serif" transform="translate(30,78)">
      <!-- Row 1 -->
      <g>
        <circle cx="8" cy="8" r="5" fill="#E85A50"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">Render-blocking JS</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">3 scripts, 480KB</text>
      </g>
      <g transform="translate(380,0)">
        <circle cx="8" cy="8" r="5" fill="#E85A50"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">Unoptimized images</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">2.1MB hero image</text>
      </g>
      <g transform="translate(760,0)">
        <circle cx="8" cy="8" r="5" fill="#E8B931"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">No schema markup</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">Missing Organization</text>
      </g>
      <!-- Row 2 -->
      <g transform="translate(0,32)">
        <circle cx="8" cy="8" r="5" fill="#E8B931"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">Thin meta descriptions</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">14 pages under 80 chars</text>
      </g>
      <g transform="translate(380,32)">
        <circle cx="8" cy="8" r="5" fill="#E85A50"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">CLS violations</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">0.28 layout shift</text>
      </g>
      <g transform="translate(760,32)">
        <circle cx="8" cy="8" r="5" fill="#E8B931"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">Missing alt text</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">22 images</text>
      </g>
      <!-- Row 3 -->
      <g transform="translate(0,64)">
        <circle cx="8" cy="8" r="5" fill="#34D399"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">HTTPS enabled</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">Valid cert</text>
      </g>
      <g transform="translate(380,64)">
        <circle cx="8" cy="8" r="5" fill="#E85A50"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">Broken internal links</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">7 x 404</text>
      </g>
      <g transform="translate(760,64)">
        <circle cx="8" cy="8" r="5" fill="#34D399"/>
        <text x="24" y="12" font-size="12" fill="#E4E8ED">XML sitemap</text>
        <text x="230" y="12" font-size="11" fill="#7A8899">Found &amp; valid</text>
      </g>
    </g>

    <!-- Legend -->
    <g font-family="system-ui,sans-serif" transform="translate(750,18)">
      <circle cx="0" cy="12" r="5" fill="#E85A50"/>
      <text x="12" y="16" font-size="10" fill="#7A8899">Critical</text>
      <circle cx="70" cy="12" r="5" fill="#E8B931"/>
      <text x="82" y="16" font-size="10" fill="#7A8899">Warning</text>
      <circle cx="150" cy="12" r="5" fill="#34D399"/>
      <text x="162" y="16" font-size="10" fill="#7A8899">Pass</text>
    </g>
  </g>
</svg>
