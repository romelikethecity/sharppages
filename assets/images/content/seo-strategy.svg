    <g transform="translate(820,16)">
      <text x="0" y="28" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#34D399">30 days</text>
      <text x="0" y="52" font-family="system-ui,sans-serif" font-size="12" fill="#7A8899">Time to first traffic</text>
