      <text x="70" y="24" font-size="11" font-weight="700" fill="#00C2E0">Technical SEO</text>
      <text x="70" y="42" font-size="10" fill="#7A8899">Core Web Vitals</text>
    </g>
    <g transform="translate(910,290)">
      <rect width="140" height="58" rx="8" fill="#0C1118" stroke="#00C2E0" stroke-width="1.5"/>
      <text x="70" y="24" font-size="11" font-weight="700" fill="#00C2E0">Internal Linking</text>
      <text x="70" y="42" font-size="10" fill="#7A8899">Hub reinforcement</text>
    </g>
    <g transform="translate(310,400)">
