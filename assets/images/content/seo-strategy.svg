<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#06090E"/>
  <text x="600" y="44" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#E4E8ED" text-anchor="middle">Programmatic SEO: Hub &amp; Spoke Architecture</text>
  <text x="600" y="66" font-family="system-ui,sans-serif" font-size="13" fill="#7A8899" text-anchor="middle">Keyword research to rankings, built at scale</text>

  <!-- Connection lines -->
  <g stroke="#1E2A38" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="600" y1="230" x2="300" y2="140"/>
    <line x1="600" y1="230" x2="600" y2="110"/>
    <line x1="600" y1="230" x2="900" y2="140"/>
    <line x1="600" y1="230" x2="220" y2="320"/>
    <line x1="600" y1="230" x2="980" y2="320"/>
    <line x1="600" y1="230" x2="380" y2="430"/>
    <line x1="600" y1="230" x2="820" y2="430"/>
  </g>

  <!-- Hub -->
  <g>
    <circle cx="600" cy="230" r="68" fill="#0C1118" stroke="#00C2E0" stroke-width="2.5"/>
    <circle cx="600" cy="230" r="56" fill="rgba(0,194,224,0.08)"/>
    <text x="600" y="220" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#00C2E0" text-anchor="middle">HUB PAGE</text>
